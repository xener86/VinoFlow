<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinoFlow - Intelligent Cellar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'system-ui', 'sans-serif'],
              serif: ['"Playfair Display"', 'Georgia', 'serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              // Wine red, ajusté pour le cockpit (plus profond)
              wine: {
                50: '#fdf6f6',
                100: '#fbe9e9',
                200: '#f5cfcf',
                300: '#eba6a6',
                400: '#dc7575',
                500: '#c44545',
                600: '#9b1c1c',
                700: '#7f1d1d',
                800: '#5c1414',
                900: '#3d0d0d',
                950: '#2a0808',
              },
              // Cream — fond crème de la version light
              cream: {
                50: '#fcfaf6',
                100: '#f5f0e6',
                200: '#ebe2cf',
              },
              paper: {
                50: '#fcfaf6',
                900: '#1c1917',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Cockpit base body */
      body {
        font-family: Outfit, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #fcfaf6;
        color: #1c1917;
      }
      .dark body { background: #1c1917; color: #fafaf9; }

      /* Helpers typographiques du design system */
      .serif    { font-family: 'Playfair Display', Georgia, serif; }
      .serif-it { font-family: 'Playfair Display', Georgia, serif; font-style: italic; }
      .mono     { font-family: 'JetBrains Mono', monospace; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #78716c; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <script type="importmap">

  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",

    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0"
  }
}
</script>
