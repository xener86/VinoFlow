services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinoflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-vinoflow}
    volumes:
      - vinoflow-db:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - vinoflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinoflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - PORT=3100
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (use a long random string)}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5001}
      - NODE_ENV=production
    networks:
      - vinoflow-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "${VINOFLOW_PORT:-5001}:80"
    networks:
      - vinoflow-network
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vinoflow-db:

networks:
  vinoflow-network:
    driver: bridge
