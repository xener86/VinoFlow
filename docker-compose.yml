services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vinoflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-vinoflow}
    volumes:
      - vinoflow-db:/var/lib/postgresql/data
    networks:
      - vinoflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinoflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - PORT=3100
      - DATABASE_URL=${DATABASE_URL:-postgresql://vinoflow:vinoflow@db:5432/vinoflow}
      - JWT_SECRET=${JWT_SECRET:-change_me}
      - NODE_ENV=production
    networks:
      - vinoflow-network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "${VINOFLOW_PORT:-5001}:80"
    networks:
      - vinoflow-network
    depends_on:
      - backend

volumes:
  vinoflow-db:

networks:
  vinoflow-network:
    driver: bridge
